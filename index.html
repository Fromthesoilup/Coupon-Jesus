<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>coupon★Jesus</title>
<script src="https://js.stripe.com/v3/"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--red:#D42B2B;--rd:#A82020;--rl:#FDEAEA;--gold:#F5A623;--gd:#C47F0A;--gl:#FEF3DC;--blk:#1A1A1A;--cr:#FAF8F5;--sf:#F3EFE8;--bd:#E5E0D8;--mu:#7A7570;--gr:#B0ACA6;--gn:#2E7D32;--gnl:#E8F5E9}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--cr);color:var(--blk);min-height:100vh;padding-top:58px}
.nav{background:var(--blk);height:58px;padding:0 14px;display:flex;align-items:center;justify-content:space-between;position:fixed;top:0;left:0;right:0;z-index:300;border-bottom:3px solid var(--red)}
.nav img{height:36px;object-fit:contain;cursor:pointer}
.nl{display:flex;gap:2px;flex-wrap:nowrap}
.nb{background:none;border:1px solid #444;color:#bbb;padding:10px 13px;border-radius:8px;cursor:pointer;font-size:15px;font-family:'DM Sans',sans-serif;font-weight:700;letter-spacing:.3px;text-transform:uppercase;transition:all .15s}
.nb:hover{background:#333;color:white}.nb.active{background:var(--red);border-color:var(--red);color:white}
.page{max-width:480px;margin:0 auto;padding:22px 16px 80px}
.pw{max-width:960px;margin:0 auto;padding:22px 18px 80px}
h1,.dsp{font-family:'Oswald',sans-serif;font-weight:700;line-height:1}
.lbl{font-size:11px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--mu)}
.btn{display:block;width:100%;padding:14px 18px;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:all .14s;text-align:center}
.btn+.btn{margin-top:10px}
.btn-r{background:var(--red);color:white}.btn-r:hover{background:var(--rd)}
.btn-g{background:var(--gold);color:var(--blk)}.btn-g:hover{background:var(--gd)}
.btn-b{background:var(--blk);color:white}.btn-b:hover{background:#333}
.btn-o{background:transparent;color:var(--blk);border:1.5px solid var(--bd)}.btn-o:hover{border-color:var(--blk)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.card{background:white;border:1px solid var(--bd);border-radius:13px;padding:18px;margin-bottom:13px}
.cdk{background:var(--blk);color:white;border-radius:13px;padding:18px;margin-bottom:13px}
.cdg{background:var(--gl);border:1.5px solid var(--gold);border-radius:13px;padding:18px;margin-bottom:13px}
.cdl{background:var(--blk);color:white;border-radius:13px;padding:18px;margin-bottom:13px;border-left:4px solid var(--gold)}
.bdg{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:3px 9px;border-radius:20px}
.br{background:var(--rl);color:var(--red)}.bg{background:var(--gl);color:var(--gd)}.bgn{background:var(--gnl);color:var(--gn)}
.field{margin-bottom:14px}
.fl{display:block;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--mu);margin-bottom:5px}
.inp{width:100%;padding:12px 14px;border:1.5px solid var(--bd);border-radius:8px;font-size:15px;font-family:'DM Sans',sans-serif;background:var(--cr);color:var(--blk);outline:none;transition:border-color .15s}
.inp:focus{border-color:var(--red);background:white}
.inpl{font-size:26px;font-weight:700;text-align:center;padding:16px}
select.inp{appearance:none;cursor:pointer}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.sc{background:white;border:1px solid var(--bd);border-radius:11px;padding:13px}
.sv{font-family:'Oswald',sans-serif;font-size:28px;font-weight:700;line-height:1.1}
.sl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--mu);margin-bottom:4px}
.ss{font-size:11px;color:var(--gr);margin-top:3px}
.row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--bd)}
.row:last-child{border-bottom:none}
.spin{display:inline-block;width:26px;height:26px;border:3px solid var(--bd);border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle}
.sms{width:14px;height:14px;border-width:2px}
.cb{background:var(--blk);border-radius:16px;padding:28px 18px;text-align:center;color:white;margin-bottom:13px}
.tap{width:100%;padding:26px 18px;background:var(--red);color:white;font-family:'Oswald',sans-serif;font-size:26px;font-weight:700;border:none;border-radius:16px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:7px;margin-bottom:13px;transition:all .12s}
.tap:active{background:var(--rd);transform:scale(.98)}
.ts{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;opacity:.85;letter-spacing:0}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:400;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:white;border-radius:15px;padding:24px;max-width:540px;width:100%;max-height:92vh;overflow-y:auto}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.mt{font-family:'Oswald',sans-serif;font-size:20px;font-weight:700}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.toast{position:fixed;bottom:20px;right:20px;background:var(--blk);color:white;padding:11px 18px;border-radius:9px;font-size:13px;font-weight:500;z-index:400;border-left:4px solid var(--gn);max-width:300px}
.toast.err{border-left-color:var(--red)}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--mu);padding:9px 11px;border-bottom:2px solid var(--bd);white-space:nowrap}
td{padding:10px 11px;border-bottom:1px solid var(--bd);font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--sf)}
.empty{text-align:center;padding:36px;color:var(--mu);font-size:13px}
.go{cursor:pointer}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:scale(.7);opacity:0}70%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
.fu{animation:fu .3s ease forwards}
.pop{animation:pop .4s cubic-bezier(.34,1.56,.64,1) forwards}
@media(max-width:600px){.r2{grid-template-columns:1fr}}@media(max-width:480px){.nav{padding:0 8px;height:52px}.nb{padding:7px 8px;font-size:12px}.nl{gap:1px}body{padding-top:52px}}@media print{body *{visibility:hidden!important}#print-signage,#print-signage *{visibility:visible!important}body{padding:0!important;margin:0!important;background:white!important}#print-signage{position:fixed!important;top:0!important;left:0!important;width:100vw!important;height:100vh!important;display:flex!important;flex-direction:column!important;align-items:center!important;justify-content:center!important;border:none!important;border-radius:0!important;padding:0!important;box-sizing:border-box!important;background:white!important;text-align:center!important}#print-signage *{text-align:center!important}#print-signage canvas{width:320px!important;height:320px!important}#print-signage h1{font-size:56px!important;line-height:1.1!important;margin-bottom:10px!important}#print-signage .lbl{font-size:14px!important;letter-spacing:2px!important;margin-bottom:16px!important}#print-signage p{font-size:18px!important;margin-bottom:20px!important}#print-signage #qvname{font-size:20px!important;font-weight:700!important;margin-bottom:14px!important;color:#1A1A1A!important}#print-signage img{height:60px!important;width:auto!important}@page{margin:0.5in;size:letter portrait}}
</style>
</head>

// ── DB ─────────────────────────────────────────────────────────────────────────
function dbGet(table, params) {
  return fetch(SB+'/rest/v1/'+table+'?'+(params||'select=*'), {headers:H})
    .then(function(r){ if(!r.ok) return r.text().then(function(t){throw new Error(t);}); return r.json(); });
}
function dbPost(table, data) {
  return fetch(SB+'/rest/v1/'+table, {method:'POST',headers:H,body:JSON.stringify(data)})
    .then(function(r){ if(!r.ok) return r.text().then(function(t){throw new Error(t);}); return r.json(); });
}
function dbPatch(table, id, data) {
  return fetch(SB+'/rest/v1/'+table+'?id=eq.'+id, {method:'PATCH',headers:H,body:JSON.stringify(data)})
    .then(function(r){ if(!r.ok) return r.text().then(function(t){throw new Error(t);}); return r.json(); });
}
function dbDel(table, id) {
  return fetch(SB+'/rest/v1/'+table+'?id=eq.'+id, {method:'DELETE',headers:H})
    .then(function(r){ return r.ok; });
}

// ── ROUTER ─────────────────────────────────────────────────────────────────────
var ST = {}, CUR_PAGE = 'home';
function go(page, data) {
  ST = data || {}; CUR_PAGE = page;
  document.querySelectorAll('.nb').forEach(function(b){b.classList.remove('active');});
  var nm = {home:'home',scan:'scan',soft_gate:'scan',redeem:'scan',savings:'savings',membership:'admin',mycj:'mycj',favs:'mycj',vendor:'vendor',validate:'vendor',qr:'vendor',admin:'admin'};
  var n = document.getElementById('nb-'+(nm[page]||page));
  if (n) n.classList.add('active');
  document.getElementById('app').innerHTML = '<div style="text-align:center;padding:60px"><div class="spin"></div></div>';
  setTimeout(function(){ renderPage(page); }, 40);
  window.scrollTo(0,0);
}
function renderPage(p) {
  var pages = {home:rHome,scan:rScan,soft_gate:rSoftGate,redeem:rRedeem,savings:rSavings,membership:rMembership,vendor:rVendor,validate:rValidate,qr:rQR,admin:rAdmin,mycj:rMyCJ,favs:rMyCJ};
  Promise.resolve().then(pages[p]||rHome).catch(function(e){
    console.error(e);
    document.getElementById('app').innerHTML = '<div class="page"><div style="background:#fff3f3;border:1px solid var(--red);border-radius:10px;padding:16px;color:var(--rd)"><strong>Error:</strong> '+e.message+'<br><br><button class="btn btn-r" data-action="retrypage">Retry</button></div></div>';
  });
}

function toast(msg, err) {
  document.querySelectorAll('.toast').forEach(function(t){t.remove();});
  var t=document.createElement('div'); t.className='toast'+(err?' err':''); t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(function(){t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(function(){t.remove();},300);},3500);
}

var TI=null;
function startTimer(svgId,secs){
  var left=secs; if(TI)clearInterval(TI);
  function tick(){
    var svg=document.getElementById(svgId); if(!svg){clearInterval(TI);return;}

    svg.innerHTML='<circle cx="50" cy="50" r="'+r+'" fill="none" stroke="rgba(255,255,255,.15)" stroke-width="6"/>'+

function calcDisc(offer,amt){
  var a=parseFloat(amt)||0; if(!a||!offer)return '0.00';
  if(offer.discount_type==='percent')return (a*offer.discount_value/100).toFixed(2);
  if(offer.discount_type==='fixed')return Math.min(offer.discount_value,a).toFixed(2);
  return '0.00';
}

function getVendorLocation(v,schedules){
  var today=new Date(),todayStr=today.toISOString().slice(0,10);
  if(v.closed_today===todayStr)return{type:'closed',label:'Closed today',lat:null,lng:null,address:null};
  if(schedules&&schedules.length){
    var dow=today.getDay(),hhmm=today.getHours()*60+today.getMinutes();
    var active=schedules.filter(function(s){if(!s.active||s.day_of_week!==dow)return false;var sd=new Date(s.start_date+'T00:00:00'),ed=new Date(s.end_date+'T23:59:59');if(today<sd||today>ed)return false;var op=s.open_time.split(':'),om=parseInt(op[0])*60+parseInt(op[1]);var cl=s.close_time.split(':'),cm=parseInt(cl[0])*60+parseInt(cl[1]);return hhmm>=om&&hhmm<=cm;});
    if(active.length){var s=active[0];return{type:'market',label:'Open now at '+s.label,sublabel:s.address,lat:s.latitude||null,lng:s.longitude||null,address:s.address};}
  }
  if(v.pin_dropped_at&&v.latitude)return{type:'live',label:v.business_name,sublabel:v.location_note||v.address,lat:v.latitude,lng:v.longitude,address:v.address};
  if(v.latitude)return{type:'store',label:v.business_name,sublabel:v.location_note||v.address,lat:v.latitude,lng:v.longitude,address:v.address};
  return{type:'store',label:v.business_name,sublabel:v.address,lat:null,lng:null,address:v.address};
}

function haversineDistance(lat1,lng1,lat2,lng2){var R=3958.8,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;var a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}

        '<div style="font-weight:700;font-size:15px;color:white;line-height:1.2">'+esc(recommended.title||'')+'</div>'+
        '<div style="font-size:12px;color:rgba(255,255,255,.6);margin-top:3px">'+esc(recommended.description||'')+'</div>'+
        (recLoc.address?'<div style="font-size:11px;color:rgba(255,255,255,.4);margin-top:3px">'+esc(recLoc.sublabel||recLoc.address)+recDist+'</div>':'')+
        (recDir?'<a href="'+recDir+'" target="_blank" style="font-size:11px;color:var(--red);font-weight:600;white-space:nowrap;display:inline-block;margin-top:6px">&#x27A1; Directions</a>':'')+
        '</div>'+
        '<div style="text-align:right;flex-shrink:0">'+
        '<div style="font-family:Oswald,sans-serif;font-size:24px;font-weight:700;color:var(--gold)">'+recDisc+'</div>'+
        (isMember?'':'<div style="font-size:10px;color:rgba(255,255,255,.4)">member deal</div>')+
        '</div></div>';
      recSection.appendChild(recCard);
      page.appendChild(recSection);
    }

    // ── SAVED DEALS with sort + pagination ─────────────────────────────────
    var PAGE_SIZE=4;
    var currentPage=0;
    var currentSort='default';

    // Sort bar
    var sortBar=document.createElement('div');
    sortBar.style.cssText='display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:10px';
    var savedLabel=document.createElement('div');
    savedLabel.style.cssText='font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--gold)';
    savedLabel.textContent='Your Saved Deals';
    var sortSel=document.createElement('select');
    sortSel.id='favSort';
    sortSel.style.cssText='padding:7px 10px;font-size:12px;background:#2A2A2A;border:1px solid #555;border-radius:8px;color:white;cursor:pointer';
    sortSel.innerHTML='<option value="default">Date Saved</option><option value="nearest">Nearest</option><option value="az">A &ndash; Z</option><option value="discount">Biggest Discount</option>';
    sortBar.appendChild(savedLabel);
    sortBar.appendChild(sortSel);
    page.appendChild(sortBar);

    // Cards container
    var cardsDiv=document.createElement('div');
    cardsDiv.id='favCards';
    page.appendChild(cardsDiv);

    // Pagination row
    var pagRow=document.createElement('div');
    pagRow.id='favPag';
    pagRow.style.cssText='display:flex;align-items:center;justify-content:space-between;margin:12px 0 16px;gap:8px';
    page.appendChild(pagRow);

    function getSorted(){
      var list=enrichedSaved.slice();
      if(currentSort==='nearest'){list.sort(function(a,b){if(a._dist===null&&b._dist===null)return 0;if(a._dist===null)return 1;if(b._dist===null)return -1;return a._dist-b._dist;});}
      else if(currentSort==='az'){list.sort(function(a,b){return(a.title||'').localeCompare(b.title||'');});}
      else if(currentSort==='discount'){list.sort(function(a,b){return(parseFloat(b.discount_value)||0)-(parseFloat(a.discount_value)||0);});}
      return list;
    }

    function renderFavPage(){
      var sorted=getSorted();
      var totalPages=Math.ceil(sorted.length/PAGE_SIZE);
      var pageItems=sorted.slice(currentPage*PAGE_SIZE,(currentPage+1)*PAGE_SIZE);
      cardsDiv.innerHTML='';
      if(!pageItems.length){
        var em=document.createElement('div');
        em.style.cssText='font-size:13px;color:var(--mu);padding:10px 0';
        em.textContent='No saved deals match.';
        cardsDiv.appendChild(em);
      } else {
        renderDealCards(pageItems,cardsDiv,isMember);
      }
      // Pagination controls
      pagRow.innerHTML='';
      if(totalPages>1){
        var prevBtn=document.createElement('button');
        prevBtn.className='btn btn-o';
        prevBtn.style.cssText='padding:8px 16px;font-size:13px;opacity:'+(currentPage===0?'0.3':'1');
        prevBtn.disabled=currentPage===0;
        prevBtn.innerHTML='&#x2190; Prev';
        prevBtn.onclick=function(){if(currentPage>0){currentPage--;renderFavPage();}};
        var pageInfo=document.createElement('div');
        pageInfo.style.cssText='font-size:13px;color:var(--mu);font-weight:600';
        pageInfo.textContent=(currentPage+1)+' of '+totalPages;
        var nextBtn=document.createElement('button');
        nextBtn.className='btn btn-r';
        nextBtn.style.cssText='padding:8px 16px;font-size:13px;opacity:'+(currentPage>=totalPages-1?'0.3':'1');
        nextBtn.disabled=currentPage>=totalPages-1;
        nextBtn.innerHTML='Next &#x2192;';
        nextBtn.onclick=function(){if(currentPage<totalPages-1){currentPage++;renderFavPage();}};
        pagRow.appendChild(prevBtn);
        pagRow.appendChild(pageInfo);
        pagRow.appendChild(nextBtn);
      }
    }

    sortSel.addEventListener('change',function(){currentSort=this.value;currentPage=0;renderFavPage();});
    renderFavPage();

    // Clear button
    var clearBtn=document.createElement('button');
    clearBtn.className='btn btn-o';
    clearBtn.style.cssText='margin-top:6px;font-size:13px;color:var(--mu);border-color:var(--mu)';
    clearBtn.textContent='Clear All Saved Deals';
    clearBtn.onclick=function(){if(confirm('Remove all saved deals?')){try{localStorage.removeItem('cj_favs');}catch(e){}go('favs',{});}};
    page.appendChild(clearBtn);

    app.appendChild(page);
  });
}


function showRecommendForm(){
  var modal=document.createElement('div');
  modal.className='overlay';modal.id='recModal';
  modal.onclick=function(e){if(e.target.id==='recModal')closeModal();};
  modal.innerHTML=
    '<div class="modal" style="max-width:420px;width:100%;padding:24px;max-height:90vh;overflow-y:auto">'+
    '<div style="font-family:Oswald,sans-serif;font-size:20px;font-weight:700;margin-bottom:4px">Recommend a Business</div>'+
    '<div style="font-size:13px;color:var(--mu);margin-bottom:18px">Know a local business that belongs on coupon&#9733;Jesus? Tell us about them.</div>'+
    '<div class="field"><label class="fl">Business Name <span style="color:var(--red)">*</span></label><input class="inp" id="rec-bname" placeholder="e.g. Green Earth Farm"></div>'+
    '<div class="field"><label class="fl">Category / Type</label><input class="inp" id="rec-cat" placeholder="e.g. Farmers Market, Butcher, CSA"></div>'+
    '<div class="field"><label class="fl">Location or Address</label><input class="inp" id="rec-addr" placeholder="City, neighborhood, or full address"></div>'+
    '<div class="field"><label class="fl">Contact Info (website, phone, or email)</label><input class="inp" id="rec-contact" placeholder="Optional but helpful"></div>'+
    '<div class="field"><label class="fl">Why should they join coupon&#9733;Jesus?</label><textarea class="inp" id="rec-why" rows="3" placeholder="What makes them special..." style="resize:vertical"></textarea></div>'+
    '<div class="field"><label class="fl">Your Name or Email (so we can follow up)</label><input class="inp" id="rec-from" placeholder="Optional"></div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px">'+
    '<button class="btn btn-r" id="recSubmitBtn">Send Recommendation</button>'+
    '<button class="btn btn-o" onclick="closeModal()">Cancel</button>'+
    '</div></div>';
  document.body.appendChild(modal);
  var sb=document.getElementById('recSubmitBtn');
  if(sb)sb.onclick=function(){submitRecommendation();};
}

function submitRecommendation(){
  var bname=(document.getElementById('rec-bname')||{}).value||'';
  if(!bname.trim()){toast('Please enter the business name.');return;}
  var btn=document.getElementById('recSubmitBtn');
  if(btn){btn.disabled=true;btn.textContent='Sending...';}
  var payload={
    business_name:bname.trim(),
    category:(document.getElementById('rec-cat')||{}).value||'',
    address:(document.getElementById('rec-addr')||{}).value||'',
    contact:(document.getElementById('rec-contact')||{}).value||'',
    why:(document.getElementById('rec-why')||{}).value||'',
    recommended_by:(document.getElementById('rec-from')||{}).value||'',
    recommended_at:new Date().toISOString(),
    status:'pending'
  };
  dbInsert('vendor_recommendations',payload).then(function(){
    closeModal();
    toast('Thank you! We will check them out and be in touch.');
  }).catch(function(err){
    // Table may not exist yet - store locally
    try{var r=JSON.parse(localStorage.getItem('cj_recs')||'[]');r.push(payload);localStorage.setItem('cj_recs',JSON.stringify(r));}catch(e){}
    closeModal();
    toast('Thank you! Your recommendation has been saved.');
    console.log('vendor_recommendations insert error (saved locally):', err);
  });
}

function closeModal(){
  var overlays=document.querySelectorAll('.overlay');
  overlays.forEach(function(el){el.parentNode.removeChild(el);});
}

function rMyCJ(){
  var activeTab=window._myCJTab||'saved';
  var app=document.getElementById('app');app.innerHTML='';
  var page=document.createElement('div');page.className='page fu';
  var tabStrip=document.createElement('div');
  tabStrip.style.cssText='display:flex;gap:0;margin-bottom:18px;background:#1A1A1A;border-radius:12px;padding:4px';
  [{id:'saved',label:'\u2764 Saved Deals'},{id:'savings',label:'&#x1F4B0; My Savings'}].forEach(function(t){
    var btn=document.createElement('button');
    btn.style.cssText='flex:1;padding:10px 8px;border:none;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;background:'+(activeTab===t.id?'var(--red)':'transparent')+';color:'+(activeTab===t.id?'white':'rgba(255,255,255,.5)');
    btn.innerHTML=t.label;
    btn.onclick=(function(tid){return function(){window._myCJTab=tid;rMyCJ();};})(t.id);
    tabStrip.appendChild(btn);
  });
  page.appendChild(tabStrip);
  var content=document.createElement('div');
  page.appendChild(content);
  app.appendChild(page);
  if(activeTab==='saved') renderSavedTab(content);
  else renderSavingsTab(content);
}

function renderSavedTab(container){
  var favs=getFavs();
  if(!favs.length){
    container.innerHTML='<div style="text-align:center;padding:30px 20px;background:var(--blk);border-radius:13px"><div style="font-size:36px;margin-bottom:12px">&#x2661;</div><div style="font-weight:700;color:white;margin-bottom:6px">No saved deals yet</div><div style="font-size:13px;color:var(--mu);margin-bottom:16px">Tap the &#x2661; on any deal to save it here.</div><button class="btn btn-r" style="max-width:200px;margin:0 auto" data-go="home">Browse Deals</button></div>';
    return;
  }
  return Promise.all([
    dbGet('offers','select=*&active=eq.true'),
    dbGet('vendors','select=*&active=eq.true'),
    dbGet('vendor_schedules','select=*&active=eq.true').catch(function(){return[];})
  ]).then(function(res){
    var allOffers=res[0]||[],vendors=res[1]||[],schedules=res[2]||[];
    var saved=allOffers.filter(function(o){return favs.indexOf(o.id)>=0;});
    var notFaved=allOffers.filter(function(o){return favs.indexOf(o.id)<0;});
    var user=getUser(),isMember=user&&user.is_member;
    function enrich(list){return list.map(function(o){var v=vendors.find(function(x){return x.id===o.vendor_id;})||{};var loc=getVendorLocation(v,schedules.filter(function(s){return s.vendor_id===v.id;}));var dist=window._userLat&&loc.lat?haversineDistance(window._userLat,window._userLng,loc.lat,loc.lng):null;return Object.assign({},o,{_vendor:v,_loc:loc,_dist:dist});});}
    var enrichedSaved=enrich(saved),enrichedOther=enrich(notFaved);
    var byDist=enrichedOther.filter(function(o){return o._dist!==null;});
    byDist.sort(function(a,b){return a._dist-b._dist;});
    var rec=byDist.length?byDist[0]:(enrichedOther.length?enrichedOther[0]:null);
    if(rec){
      var rw=document.createElement('div');rw.style.marginBottom='18px';
      var rl=document.createElement('div');rl.style.cssText='font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--gold);margin-bottom:8px';
      rl.textContent=rec._dist!==null?'Recommended Near You':'Recommended Deal';
      rw.appendChild(rl);
      var rc=document.createElement('div');rc.style.cssText='background:#1A1A1A;border:1px solid rgba(245,166,35,.35);border-radius:13px;padding:16px;cursor:pointer';
      rc.setAttribute('data-offer',rec.id);
      var rd=rec.discount_type==='percent'?rec.discount_value+'% off':rec.discount_type==='fixed'?'$'+parseFloat(rec.discount_value||0).toFixed(0)+' off':esc(rec.discount_value||'');
      var rdir=getDirectionsUrl(rec._loc.lat,rec._loc.lng,rec._loc.address);
      rc.innerHTML='<div style="font-size:10px;font-weight:700;color:var(--gold);margin-bottom:6px">'+(rec._dist!==null?'&#x1F4CD; '+rec._dist.toFixed(1)+' mi away':'&#x2728; Recommended for you')+'</div><div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px"><div><div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:rgba(245,166,35,.7);margin-bottom:2px">'+esc(rec.vendor_name||'')+'</div><div style="font-weight:700;font-size:15px;color:white">'+esc(rec.title||'')+'</div><div style="font-size:12px;color:rgba(255,255,255,.55);margin-top:2px">'+esc(rec.description||'')+'</div>'+(rdir?'<a href="'+rdir+'" target="_blank" onclick="event.stopPropagation()" style="font-size:11px;color:var(--red);font-weight:700;display:inline-block;margin-top:6px">&#x27A1; Directions</a>':'')+'</div><div style="text-align:right;flex-shrink:0"><div style="font-family:Oswald,sans-serif;font-size:22px;font-weight:700;color:var(--gold)">'+rd+'</div></div></div>';
      rw.appendChild(rc);container.appendChild(rw);
    }
    var PAGE_SIZE=4,currentPage=0,currentSort='default';
    var sb=document.createElement('div');sb.style.cssText='display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:8px';
    var sl=document.createElement('div');sl.style.cssText='font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--gold)';sl.textContent='Your Saved Deals';
    var ss=document.createElement('select');ss.style.cssText='padding:6px 10px;font-size:12px;background:#2A2A2A;border:1px solid #555;border-radius:8px;color:white;cursor:pointer';
    ss.innerHTML='<option value="default">Date Saved</option><option value="nearest">Nearest</option><option value="az">A \u2013 Z</option><option value="discount">Biggest Discount</option>';
    sb.appendChild(sl);sb.appendChild(ss);container.appendChild(sb);
    var cd=document.createElement('div');container.appendChild(cd);
    var pr=document.createElement('div');pr.style.cssText='display:flex;align-items:center;justify-content:space-between;margin:10px 0 14px;gap:8px';container.appendChild(pr);
    function getSorted(){var list=enrichedSaved.slice();if(currentSort==='nearest'){list.sort(function(a,b){if(a._dist===null)return 1;if(b._dist===null)return-1;return a._dist-b._dist;});}else if(currentSort==='az'){list.sort(function(a,b){return(a.title||'').localeCompare(b.title||'');});}else if(currentSort==='discount'){list.sort(function(a,b){return(parseFloat(b.discount_value)||0)-(parseFloat(a.discount_value)||0);});}return list;}
    function doPage(){var sorted=getSorted();var total=Math.ceil(sorted.length/PAGE_SIZE);var items=sorted.slice(currentPage*PAGE_SIZE,(currentPage+1)*PAGE_SIZE);cd.innerHTML='';if(!items.length){var em=document.createElement('div');em.style.cssText='font-size:13px;color:var(--mu);padding:10px 0';em.textContent='No saved deals.';cd.appendChild(em);}else renderDealCards(items,cd,isMember);pr.innerHTML='';if(total>1){var pv=document.createElement('button');pv.className='btn btn-o';pv.style.cssText='padding:8px 16px;font-size:13px;flex:1;opacity:'+(currentPage===0?'0.3':'1');pv.disabled=currentPage===0;pv.innerHTML='&#x2190; Prev';pv.onclick=function(){if(currentPage>0){currentPage--;doPage();}};var pi=document.createElement('div');pi.style.cssText='font-size:13px;color:var(--mu);font-weight:600;text-align:center;flex:1';pi.textContent=(currentPage+1)+' of '+total;var nx=document.createElement('button');nx.className='btn btn-r';nx.style.cssText='padding:8px 16px;font-size:13px;flex:1;opacity:'+(currentPage>=total-1?'0.3':'1');nx.disabled=currentPage>=total-1;nx.innerHTML='Next &#x2192;';nx.onclick=function(){if(currentPage<total-1){currentPage++;doPage();}};pr.appendChild(pv);pr.appendChild(pi);pr.appendChild(nx);}}
    ss.addEventListener('change',function(){currentSort=this.value;currentPage=0;doPage();});
    doPage();
    var clr=document.createElement('button');clr.className='btn btn-o';clr.style.cssText='margin-top:4px;font-size:12px;color:var(--mu);border-color:var(--mu)';clr.textContent='Clear All Saved Deals';clr.onclick=function(){if(confirm('Remove all saved deals?')){try{localStorage.removeItem('cj_favs');}catch(e){}rMyCJ();}};container.appendChild(clr);
  });
}

function renderSavingsTab(container){
  var user=getUser();
  if(!user||!user.email){container.innerHTML='<div style="text-align:center;padding:30px 20px;background:var(--blk);border-radius:13px"><div style="font-size:36px;margin-bottom:10px">&#x1F4B0;</div><div style="font-weight:700;color:white;margin-bottom:6px">Track Your Savings</div><div style="font-size:13px;color:var(--mu);margin-bottom:16px">Scan a deal to start tracking how much you save.</div><button class="btn btn-r" style="max-width:200px;margin:0 auto" data-go="scan">Scan a Deal</button></div>';return;}
  dbGet('redemptions','select=*&member_email=eq.'+encodeURIComponent(user.email)+'&order=created_at.desc').then(function(R){
    if(!R||!R.length){container.innerHTML='<div style="text-align:center;padding:30px 20px;background:var(--blk);border-radius:13px"><div style="font-size:36px;margin-bottom:10px">&#x1F4B0;</div><div style="font-weight:700;color:white;margin-bottom:6px">No savings yet</div><div style="font-size:13px;color:var(--mu)">Redeem your first deal to start tracking!</div></div>';return;}
    var total=R.reduce(function(a,r){return a+parseFloat(r.discount_given||0);},0);
    var spent=R.reduce(function(a,r){return a+parseFloat(r.amount_spent||0);},0);
    var stats=document.createElement('div');stats.style.cssText='display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px';
    stats.innerHTML='<div class="sc"><div class="sl">Total Saved</div><div class="sv">$'+total.toFixed(2)+'</div><div class="ss">all time</div></div><div class="sc"><div class="sl">Total Spent</div><div class="sv">$'+spent.toFixed(0)+'</div><div class="ss">at local biz</div></div><div class="sc"><div class="sl">Redemptions</div><div class="sv">'+R.length+'</div><div class="ss">deals used</div></div>';
    container.appendChild(stats);
    var lbl=document.createElement('div');lbl.style.cssText='font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--gold);margin-bottom:10px';lbl.textContent='Recent Activity';container.appendChild(lbl);
    R.slice(0,10).forEach(function(r){var row=document.createElement('div');row.style.cssText='background:var(--blk);border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;gap:10px';row.innerHTML='<div><div style="font-size:13px;font-weight:600;color:white">'+esc(r.offer_title||'Deal')+'</div><div style="font-size:11px;color:var(--mu)">'+esc(r.vendor_name||'')+(r.created_at?' &bull; '+new Date(r.created_at).toLocaleDateString():'')+'</div></div><div style="text-align:right;flex-shrink:0"><div style="font-weight:700;color:white;font-size:14px">$'+parseFloat(r.amount_spent||0).toFixed(2)+'</div><div style="font-size:11px;color:var(--gold)">-$'+parseFloat(r.discount_given||0).toFixed(2)+' saved</div></div>';container.appendChild(row);});
  }).catch(function(){container.innerHTML='<div style="font-size:13px;color:var(--mu)">Could not load savings data.</div>';});
}

var urlParams=new URLSearchParams(window.location.search);
var offerFromQR=urlParams.get('offer');
if(offerFromQR)go('soft_gate',{offerId:offerFromQR});
else go('home',{});
</script>
